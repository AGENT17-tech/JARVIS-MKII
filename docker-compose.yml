version: "3.8"

services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: jarvis-hindsight
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - HINDSIGHT_API_LLM_PROVIDER=ollama
      - HINDSIGHT_API_LLM_MODEL=llama3.1:8b
      - HINDSIGHT_API_LLM_BASE_URL=http://192.168.1.3:11434/v1
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    restart: unless-stopped

volumes:
  hindsight_data:
    driver: local
